<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>fan site</title>
    <style>
        /* Добавим плавность для увеличения глаза */
        #eye {
            transition: transform 0.1s ease-in-out;
        }
    </style>
</head>
<body bgcolor="black">

<div align="center">
    <br><br><br><br><br><br><br><br>
    <img id="eye" 
         src="eye.gif" 
         style="cursor: pointer;" 
         alt="Анимированный глаз" 
         title="НУРБОЛ ГОВНО"> 

    <script>
        const eyeImage = document.getElementById('eye');

        eyeImage.addEventListener('click', function() {
            // Создаем объект аудио
            const audio = new Audio('scream.mp3');
            audio.volume = 1.0; // Максимальная громкость
            
            // Запускаем звук
            audio.play().catch(function(error) {
                console.log("Ошибка воспроизведения: " + error);
            });
            
            // Резко увеличиваем глаз
            eyeImage.style.transform = "scale(3)"; // Сделал масштаб побольше для эффекта
        });
    </script>
</div>

</body>
</html>
