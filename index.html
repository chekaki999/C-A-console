<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Красная Кнопка</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f0f0;
            overflow: hidden;
        }

        #redButton {
            background-color: #ff4d4d;
            color: white;
            border: none;
            padding: 20px 40px;
            font-size: 24px;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.5s ease; /* Плавная анимация */
            z-index: 10;
        }

        /* Класс, который мы добавим через JS */
        .fullscreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw !important;
            height: 100vh !important;
            border-radius: 0 !important;
            font-size: 50px !important;
        }
    </style>
</head>
<body>

    <button id="redButton">Нажми меня!</button>

    <script>
        const btn = document.getElementById('redButton');

        btn.addEventListener('click', () => {
            btn.classList.toggle('fullscreen');
            
            if (btn.classList.contains('fullscreen')) {
                btn.textContent = "Теперь я — всё!";
            } else {
                btn.textContent = "Нажми меня!";
            }
        });
    </script>

</body>
</html>
