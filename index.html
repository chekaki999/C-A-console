<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>AAAA</title>
    <style>
        body {
            background:url(scream.gif)
        }
    </style>
</head>
<body>

    <audio id="clickSound">
        <source src="scream.mp3" type="audio/mpeg">
    </audio>

    <script>
        // Слушаем клик по всему документу
        document.addEventListener('click', function() {
            const audio = document.getElementById('clickSound');
            
            // Сбрасываем в начало, чтобы можно было кликать часто
            audio.currentTime = 0; 
            
            // Запускаем звук
            audio.play().catch(function(error) {
                console.log("Браузер заблокировал звук до первого взаимодействия.");
            });
        });
    </script>

</body>
</html>
